name = "sales-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
JWT_SECRET = "change-this-to-a-secure-random-string-in-production"
APP_ENV = "production"
LICENSE_KEY = "ABC-123"
LICENSE_SECRET = "super-secret-key"
LICENSE_SERVER_URL = "https://license.retailer-sales.workers.dev/validate"
GOOGLE_CLIENT_ID = "938440224317-l5arlpo9r92palggdh22vu9o49k5fill.apps.googleusercontent.com"

[[d1_databases]]
binding = "DB"
database_name = "sales-db"
database_id = "25c4d3f3-e956-4d97-b1b8-321c678e178c"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "sales-product-images"

[[services]]
binding = "LICENSE"
service = "license"

[triggers]
crons = []

# For local development
[dev]
port = 8787
local_protocol = "http"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
